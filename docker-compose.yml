# Compose loads `.env` for variable interpolation and passes the same file into the container via `env_file`.
#
# HTTP-only ERP integration (see README migration note). No bench or local DB coupling.
#
# Runtime: attach this stack to the ERP stack’s internal Docker network so the service can
# resolve the Frappe backend hostname (see README “Runtime wiring (Docker / ERP)”).

services:
  erp-execution-service:
    build: .
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - default
      - axis-erp-internal

networks:
  axis-erp-internal:
    external: true
    name: axiserp-erpnext-pnzjyk_axis-erp-internal
