# Local development: Compose loads `.env` for interpolation and passes variables into the container via `env_file`.
# Copy `.env.example` to `.env` (`.env` is gitignored). Production uses `docker-compose.dokploy.yml` + Dokploy env.
#
# HTTP-only ERP integration (see README migration note). No bench or local DB coupling.
#
# Runtime: attach this stack to the ERP stack’s internal Docker network so the service can
# resolve the Frappe backend hostname (see README “Runtime wiring (Docker / ERP)”).

services:
  erp-execution-service:
    build: .
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
      - axis-erp-internal

networks:
  dokploy-network:
    external: true
  axis-erp-internal:
    external: true
