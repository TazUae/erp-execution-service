# Optional overlay for Dokploy: init, expose (behind reverse proxy), attach to Dokploy's external network.
# Same env contract as docker-compose.yml (HTTP-only ERP integration).
#
# The service joins:
# - dokploy-network — reverse proxy / platform routing
# - axiserp-erpnext-pnzjyk_axis-erp-internal — ERPNext backend (axis-erp-backend:8000)

name: erp-execution-service

services:
  erp-execution-service:
    build: .
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-8790}
      ERP_REMOTE_TOKEN: ${ERP_REMOTE_TOKEN}
      ERP_COMMAND_TIMEOUT_MS: ${ERP_COMMAND_TIMEOUT_MS:-30000}
      ERP_BASE_URL: ${ERP_BASE_URL:-}
      ERP_PROVISIONING_TOKEN: ${ERP_PROVISIONING_TOKEN:-}
    expose:
      - "${PORT:-8790}"
    networks:
      - dokploy-network
      - axis-erp-internal

networks:
  dokploy-network:
    external: true
  axis-erp-internal:
    external: true
    name: axiserp-erpnext-pnzjyk_axis-erp-internal
