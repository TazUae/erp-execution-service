# Optional overlay for Dokploy: init, expose (behind reverse proxy), attach to Dokploy's external network.
# Same env contract as docker-compose.yml (HTTP-only ERP integration).
#
# Use when you need `expose` + `dokploy-network` instead of publishing host ports.
# If you must join a second Docker network (e.g. shared ERP), duplicate the service `networks` entry and add a `networks:` block locally or extend this file.

name: erp-execution-service

services:
  erp-execution-service:
    build: .
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-8790}
      ERP_REMOTE_TOKEN: ${ERP_REMOTE_TOKEN}
      ERP_COMMAND_TIMEOUT_MS: ${ERP_COMMAND_TIMEOUT_MS:-30000}
      ERP_BASE_URL: ${ERP_BASE_URL:-}
      ERP_API_KEY: ${ERP_API_KEY:-}
      ERP_API_SECRET: ${ERP_API_SECRET:-}
    expose:
      - "${PORT:-8790}"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
